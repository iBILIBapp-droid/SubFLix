# ============================================================
# SUBFLIX — nginx.conf  (alternative to the Node.js proxy)
# Drop this into /etc/nginx/sites-available/subflix
# then: sudo ln -s /etc/nginx/sites-available/subflix /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name yourdomain.com;   # ← change this

    # Serve your Subflix front-end files
    root /var/www/subflix;        # ← put subflix.html/css/js here
    index subflix.html;

    # ── Proxy all /proxy/* requests to onoflix ──
    location /proxy/ {

        # Strip the /proxy prefix, forward the rest
        rewrite ^/proxy(/.*)$ $1 break;

        proxy_pass https://onoflix.live;
        proxy_ssl_server_name on;

        # Forward real host so the upstream responds correctly
        proxy_set_header Host            onoflix.live;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";   # disable gzip so sub_filter works

        # ── Text replacements ──
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;

        sub_filter 'onoflix' 'Subflix';
        sub_filter 'Onoflix' 'Subflix';
        sub_filter 'ONOFLIX' 'SUBFLIX';

        # Rewrite absolute URLs in the response so links stay inside proxy
        sub_filter 'https://onoflix.live' '/proxy';
        sub_filter 'http://onoflix.live'  '/proxy';

        # ── Remove headers that block iframe embedding ──
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;

        # Add permissive headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Frame-Options ""              always;

        # ── Inject style block to hide Discord/Telegram/back buttons ──
        sub_filter '</head>' '
<style>
  a[href*="discord"], a[href*="t.me"], a[href*="telegram"],
  a[href*="discord.gg"], [class*="discord" i], [class*="telegram" i],
  [id*="discord" i], [id*="telegram" i],
  [class*="back-btn" i], [class*="backBtn" i],
  [class*="back-button" i], [class*="BackButton" i],
  [class*="go-back" i], button.back, .btn-back, .nav-back,
  [aria-label="Go back"], [aria-label="Back"],
  [data-testid*="back" i] { display: none !important; }
</style>
</head>';

        # Handle redirects — rewrite Location header to stay in proxy
        proxy_redirect https://onoflix.live/ /proxy/;
        proxy_redirect http://onoflix.live/  /proxy/;
    }

    # ── Serve front-end for all other paths ──
    location / {
        try_files $uri $uri/ /subflix.html;
    }
}
